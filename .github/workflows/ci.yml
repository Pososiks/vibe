name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Contract tests
        run: bun run test:contracts

      - name: Webapp client tests
        run: bun run test:webapp

# Webapp Playwright E2E needs a live Supabase project (URL + anon key, and a
# service-role key to seed the authenticated flow). Run it locally / in an
# environment with those secrets via `bun run e2e:webapp`.
